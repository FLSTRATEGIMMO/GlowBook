<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLOW BOOK</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500;600&display=swap');
:root{--rose:#E8507A;--rose-d:#C23060;--rose-l:#F5A3BC;--peach:#F2896A;--purple:#9B6BB5;--gold:#D4A853;--cream:#FDF8F4;--white:#fff;--dark:#1C1218;--grey:#7A6E72;--gl:#EDE8EB;--green:#5BAA85;}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--dark);min-height:100vh;overflow-x:hidden}
#splash{position:fixed;inset:0;background:linear-gradient(145deg,#1C1218,#3A1A28);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .5s}
#splash.off{opacity:0;pointer-events:none}
.slogo{font-family:'Cormorant Garamond',serif;font-size:3rem;font-weight:300;letter-spacing:.3em;color:#fff}.slogo span{color:var(--rose)}
.ssub{font-size:.68rem;letter-spacing:.22em;color:var(--rose-l);text-transform:uppercase;margin:.3rem 0 2.5rem}
.sform{display:flex;flex-direction:column;align-items:center;gap:.8rem;width:260px}
.sform input{width:100%;padding:.85rem 1.1rem;background:rgba(255,255,255,.09);border:1px solid rgba(232,80,122,.4);border-radius:50px;color:#fff;font-family:'DM Sans',sans-serif;font-size:.9rem;text-align:center;outline:none}
.sform input::placeholder{color:rgba(255,255,255,.35)}
.sbtn{width:100%;padding:.9rem;background:linear-gradient(135deg,var(--rose),var(--rose-d));border:none;border-radius:50px;color:#fff;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;cursor:pointer}
header{background:linear-gradient(135deg,#1C1218,#3A1A28);padding:1rem 1.2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.hbrand{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:300;letter-spacing:.2em;color:#fff}.hbrand span{color:var(--rose)}
.huser{font-size:.7rem;color:var(--rose-l);margin-top:.1rem}
.hstats{display:flex;gap:1rem}
.hst .n{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:600;color:var(--rose);text-align:center}
.hst .l{font-size:.58rem;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.07em;text-align:center}
.pstrip{background:var(--white);padding:.7rem 1.2rem;display:flex;gap:.5rem;flex-wrap:wrap;border-bottom:1px solid var(--gl)}
.ppill{display:flex;align-items:center;gap:.4rem;background:var(--gl);border-radius:50px;padding:.3rem .7rem;font-size:.68rem;font-weight:500;color:var(--grey);flex:1;min-width:100px}
.ppill .bw{flex:1;height:4px;background:rgba(0,0,0,.08);border-radius:10px;overflow:hidden}
.ppill .bf{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--rose),var(--peach));transition:width .5s}
.ppill .pv{font-size:.62rem;color:var(--rose);font-weight:600;min-width:2.2rem;text-align:right}
nav.tnav{background:var(--white);display:flex;border-bottom:2px solid var(--gl);overflow-x:auto;scrollbar-width:none}
nav.tnav::-webkit-scrollbar{display:none}
.nb{flex:1;min-width:80px;padding:.8rem .4rem;border:none;background:none;font-family:'DM Sans',sans-serif;font-size:.65rem;font-weight:500;color:var(--grey);letter-spacing:.07em;text-transform:uppercase;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap}
.nb .ic{display:block;font-size:1.1rem;margin-bottom:.15rem}
.nb.on{color:var(--rose);border-bottom-color:var(--rose)}
.tab{display:none}.tab.on{display:block;animation:fi .25s ease}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.sechd{padding:1.2rem 1.2rem .4rem;display:flex;align-items:center;gap:.7rem}
.sechd h2{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:400}
.badge{background:var(--rose);color:#fff;font-size:.6rem;font-weight:700;letter-spacing:.1em;padding:.2rem .65rem;border-radius:50px;text-transform:uppercase}
.frow{padding:.3rem 1.2rem .7rem;display:flex;gap:.4rem;flex-wrap:wrap}
.fb{padding:.3rem .85rem;border-radius:50px;border:1.5px solid var(--gl);background:none;font-family:'DM Sans',sans-serif;font-size:.7rem;font-weight:500;color:var(--grey);cursor:pointer;transition:all .2s}
.fb.on,.fb:hover{border-color:var(--rose);color:var(--rose);background:rgba(232,80,122,.06)}
.wgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:.9rem;padding:0 .9rem 5rem}
.wcard{background:var(--white);border-radius:16px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.06);cursor:pointer;position:relative;transition:transform .2s,box-shadow .2s}
.wcard:hover{transform:translateY(-3px);box-shadow:0 10px 25px rgba(232,80,122,.12)}
.wcard.done::after{content:'✓';position:absolute;top:.7rem;right:.7rem;width:24px;height:24px;background:var(--green);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700}
.wca{height:5px}
.wca.haut{background:linear-gradient(90deg,var(--rose),var(--rose-l))}
.wca.bas{background:linear-gradient(90deg,var(--purple),#C08FD4)}
.wca.complet{background:linear-gradient(90deg,var(--gold),var(--peach))}
.wcb{padding:.9rem 1.1rem}
.wcn{font-family:'Cormorant Garamond',serif;font-size:.75rem;font-weight:300;color:var(--grey);letter-spacing:.14em;text-transform:uppercase}
.wct{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:600;color:var(--dark);line-height:1.2;margin:.2rem 0}
.wcc{display:inline-block;font-size:.6rem;font-weight:600;letter-spacing:.1em;padding:.15rem .6rem;border-radius:50px;text-transform:uppercase;margin-bottom:.5rem}
.wcc.haut{background:rgba(232,80,122,.12);color:var(--rose-d)}
.wcc.bas{background:rgba(155,107,181,.14);color:#7A4A99}
.wcc.complet{background:rgba(212,168,83,.15);color:#8A6410}
.wcm{display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:.6rem}
.wmt{font-size:.68rem;color:var(--grey)}
.wce{font-size:.75rem;color:var(--grey);line-height:1.5}
.wce strong{color:var(--dark)}
.wcf{display:flex;align-items:center;justify-content:space-between;padding:.6rem 1.1rem;border-top:1px solid var(--gl);background:rgba(253,248,244,.5)}
.wcr{font-size:.7rem;color:var(--grey)}
.wcr span{color:var(--rose);font-weight:600}
.blogbtn{padding:.35rem .85rem;background:linear-gradient(135deg,var(--rose),var(--rose-d));border:none;border-radius:50px;color:#fff;font-family:'DM Sans',sans-serif;font-size:.7rem;font-weight:600;cursor:pointer}
.mover{position:fixed;inset:0;background:rgba(28,18,24,.7);backdrop-filter:blur(5px);z-index:500;display:none;align-items:flex-end;justify-content:center}
.mover.open{display:flex}
.mc{background:var(--white);border-radius:22px 22px 0 0;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;animation:su .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes su{from{transform:translateY(100%)}to{transform:none}}
.mhd{padding:1.2rem 1.3rem .9rem;border-bottom:1px solid var(--gl);display:flex;align-items:flex-start;justify-content:space-between;position:sticky;top:0;background:var(--white)}
.mnum{font-size:.66rem;color:var(--grey);letter-spacing:.14em;text-transform:uppercase}
.mtit{font-family:'Cormorant Garamond',serif;font-size:1.7rem;font-weight:600;color:var(--dark);line-height:1.1;margin-top:.18rem}
.mcl{background:var(--gl);border:none;width:30px;height:30px;border-radius:50%;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mbdy{padding:1rem 1.3rem}
.mig{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin-bottom:1rem}
.ib{background:var(--gl);border-radius:10px;padding:.7rem .9rem}
.ib .il{font-size:.6rem;color:var(--grey);text-transform:uppercase;letter-spacing:.09em}
.ib .iv{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:600;color:var(--dark)}
.exlist{list-style:none;margin-bottom:1rem}
.exlist li{display:flex;align-items:flex-start;gap:.7rem;padding:.6rem 0;border-bottom:1px solid var(--gl);font-size:.83rem;line-height:1.45}
.exlist li:last-child{border-bottom:none}
.exi{width:28px;height:28px;border-radius:50%;background:rgba(232,80,122,.1);display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0}
.exn{font-weight:600;color:var(--dark)}
.exd{color:var(--grey);font-size:.76rem}
.ext{color:var(--rose);font-size:.71rem;font-style:italic;margin-top:.15rem}
.lf h3{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:600;color:var(--dark);margin-bottom:.75rem}
.frow2{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin-bottom:.7rem}
.fg{display:flex;flex-direction:column;gap:.25rem}
.fg label{font-size:.64rem;color:var(--grey);text-transform:uppercase;letter-spacing:.07em}
.fg input,.fg textarea{padding:.62rem .82rem;border:1.5px solid var(--gl);border-radius:9px;font-family:'DM Sans',sans-serif;font-size:.84rem;color:var(--dark);background:var(--white);outline:none;transition:border-color .2s}
.fg input:focus,.fg textarea:focus{border-color:var(--rose)}
.feelrow{display:flex;gap:.4rem;margin-bottom:.75rem}
.fbtn{flex:1;padding:.5rem .3rem;border:1.5px solid var(--gl);border-radius:9px;background:none;font-family:'DM Sans',sans-serif;font-size:.7rem;text-align:center;cursor:pointer;transition:all .2s}
.fbtn.on,.fbtn:hover{border-color:var(--rose);background:rgba(232,80,122,.08)}
.fbtn .em{display:block;font-size:1.2rem;margin-bottom:.15rem}
.savebtn{width:100%;padding:.9rem;background:linear-gradient(135deg,var(--rose),var(--rose-d));border:none;border-radius:50px;color:#fff;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;margin-top:.4rem}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:.9rem;padding:0 .9rem 5rem}
.ccard{background:var(--white);border-radius:16px;padding:1.1rem;box-shadow:0 2px 10px rgba(0,0,0,.06);cursor:pointer;transition:transform .2s;border-left:4px solid var(--rose);position:relative}
.ccard:hover{transform:translateY(-2px)}
.ccard.done{border-left-color:var(--green)}
.ccn{font-size:.6rem;color:var(--grey);letter-spacing:.13em;text-transform:uppercase}
.cct{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:600;color:var(--dark);margin:.2rem 0 .35rem}
.ccd{font-size:.76rem;color:var(--grey);line-height:1.45}
.ccg{margin-top:.6rem;padding:.4rem .8rem;background:rgba(232,80,122,.08);border-radius:7px;font-size:.76rem;color:var(--rose-d);font-weight:600}
.ccic{position:absolute;top:.9rem;right:.9rem;font-size:1.2rem}
.lbinner{padding:.9rem .9rem 5rem}
.logempty{text-align:center;padding:3.5rem 1.5rem;color:var(--grey)}
.logempty .big{font-size:2.8rem;margin-bottom:.8rem}
.lentry{background:var(--white);border-radius:12px;padding:.9rem 1.1rem;margin-bottom:.6rem;box-shadow:0 2px 7px rgba(0,0,0,.05);display:flex;align-items:flex-start;gap:.9rem}
.ldate{text-align:center;min-width:38px}
.lday{font-family:'Cormorant Garamond',serif;font-size:1.45rem;font-weight:600;color:var(--rose);line-height:1}
.lmo{font-size:.56rem;color:var(--grey);text-transform:uppercase;letter-spacing:.07em}
.linfo{flex:1}
.lwn{font-weight:600;color:var(--dark);font-size:.85rem}
.ldet{font-size:.74rem;color:var(--grey);margin-top:.15rem}
.pginner{padding:.9rem .9rem 5rem}
.pgcard{background:var(--white);border-radius:16px;padding:1.2rem;margin-bottom:.9rem;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.pgcard h3{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:600;margin-bottom:.9rem;color:var(--dark)}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
.sbox{background:var(--gl);border-radius:10px;padding:.9rem;text-align:center}
.sbox .bn{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:600;color:var(--rose);line-height:1}
.sbox .sl{font-size:.65rem;color:var(--grey);margin-top:.25rem;text-transform:uppercase;letter-spacing:.07em}
.cbars{display:flex;flex-direction:column;gap:.75rem}
.cbar{display:flex;align-items:center;gap:.7rem}
.cbl{font-size:.76rem;color:var(--grey);min-width:90px}
.cbt{flex:1;height:7px;background:var(--gl);border-radius:10px;overflow:hidden}
.cbf{height:100%;border-radius:10px;transition:width .7s}
.cbf.haut{background:linear-gradient(90deg,var(--rose),var(--rose-l))}
.cbf.bas{background:linear-gradient(90deg,var(--purple),#C08FD4)}
.cbf.complet{background:linear-gradient(90deg,var(--gold),var(--peach))}
.cbf.defi{background:linear-gradient(90deg,var(--green),#8FD4B8)}
.cbp{font-size:.76rem;font-weight:600;color:var(--dark);min-width:32px;text-align:right}
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--gl);display:none;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.bnav .nb{padding:.7rem .2rem .5rem;flex:1}
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--dark);color:#fff;padding:.6rem 1.3rem;border-radius:50px;font-size:.8rem;font-weight:500;opacity:0;pointer-events:none;transition:all .3s;z-index:9999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.sp{height:68px}
@media(min-width:600px){.bnav{display:none!important}}
@media(max-width:599px){nav.tnav{display:none}.bnav{display:flex}}
</style>
</head>
<body>

<div id="splash">
  <div class="slogo">GLOW<span>BOOK</span></div>
  <div class="ssub">Programme Tonification · Femme</div>
  <div class="sform">
    <input type="text" id="nameIn" placeholder="Ton prénom..." maxlength="20" onkeypress="if(event.key==='Enter')startApp()">
    <button class="sbtn" id="startBtn" onclick="startApp()">COMMENCER →</button>
  </div>
</div>

<header>
  <div><div class="hbrand">GLOW<span>BOOK</span></div><div class="huser" id="hUser">— Niveau SCULPT —</div></div>
  <div class="hstats">
    <div class="hst"><div class="n" id="hDone">0</div><div class="l">Faits</div></div>
    <div class="hst"><div class="n">150</div><div class="l">WODs</div></div>
    <div class="hst"><div class="n" id="hCh">0</div><div class="l">Défis</div></div>
  </div>
</header>

<div class="pstrip">
  <div class="ppill">💪 Haut <div class="bw"><div class="bf" id="pgH" style="width:0%"></div></div><div class="pv" id="pvH">0%</div></div>
  <div class="ppill">🍑 Bas <div class="bw"><div class="bf" id="pgB" style="width:0%"></div></div><div class="pv" id="pvB">0%</div></div>
  <div class="ppill">⭐ Complet <div class="bw"><div class="bf" id="pgC" style="width:0%"></div></div><div class="pv" id="pvC">0%</div></div>
  <div class="ppill">🔥 Défis <div class="bw"><div class="bf" id="pgD" style="width:0%"></div></div><div class="pv" id="pvD">0%</div></div>
</div>

<nav class="tnav" id="dNav">
  <button class="nb on" onclick="showTab('wods',this)"><span class="ic">💪</span>Haut</button>
  <button class="nb" onclick="showTab('bas',this)"><span class="ic">🍑</span>Bas</button>
  <button class="nb" onclick="showTab('complet',this)"><span class="ic">⭐</span>Complet</button>
  <button class="nb" onclick="showTab('defis',this)"><span class="ic">🔥</span>Défis</button>
  <button class="nb" onclick="showTab('log',this)"><span class="ic">📋</span>Logbook</button>
  <button class="nb" onclick="showTab('prog',this)"><span class="ic">📈</span>Progrès</button>
</nav>

<div id="tab-wods" class="tab on">
  <div class="sechd"><h2>Haut du corps</h2><div class="badge">50 WODs · Bras · Épaules · Abdos</div></div>
  <div class="frow">
    <button class="fb on" onclick="filt('haut','all',this)">Tous</button>
    <button class="fb" onclick="filt('haut','done',this)">✓ Faits</button>
    <button class="fb" onclick="filt('haut','todo',this)">À faire</button>
  </div>
  <div class="wgrid" id="gHaut"></div>
</div>

<div id="tab-bas" class="tab">
  <div class="sechd"><h2>Bas du corps</h2><div class="badge">50 WODs · Fessiers · Cuisses</div></div>
  <div class="frow">
    <button class="fb on" onclick="filt('bas','all',this)">Tous</button>
    <button class="fb" onclick="filt('bas','done',this)">✓ Faits</button>
    <button class="fb" onclick="filt('bas','todo',this)">À faire</button>
  </div>
  <div class="wgrid" id="gBas"></div>
</div>

<div id="tab-complet" class="tab">
  <div class="sec
